services:
  postgres:
    image: postgres:16-alpine
    container_name: neo_linear_postgres
    environment:
      POSTGRES_USER: neo_linear
      POSTGRES_PASSWORD: ebB2eYukf+HELS1BocGAbJ35g9MByRG06AYmH7b5I3E=
      POSTGRES_DB: neo_linear
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U neo_linear" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: neo_linear_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass t4sl6bC596nGDcHdRQ6u1HM04k9VCu6haMd2hxUmnc4=
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "t4sl6bC596nGDcHdRQ6u1HM04k9VCu6haMd2hxUmnc4=", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgresql://neo_linear:ebB2eYukf+HELS1BocGAbJ35g9MByRG06AYmH7b5I3E=@postgres:5432/neo_linear
        JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
        NODE_ENV: production
        FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
        PORT: 3001
    container_name: neo_linear_server
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://neo_linear:ebB2eYukf+HELS1BocGAbJ35g9MByRG06AYmH7b5I3E=@postgres:5432/neo_linear
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: t4sl6bC596nGDcHdRQ6u1HM04k9VCu6haMd2hxUmnc4=
      REDIS_ENABLED: "true"
      REDIS_PREFIX: "neo_linear:"
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production-use-openssl-rand-hex-32}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - neo_linear_network

volumes:
  postgres_data:
  redis_data:

networks:
  neo_linear_network:
    driver: bridge
