global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'navigator-monitor'

scrape_configs:
  # Claude Code metrics (if exposed)
  - job_name: 'claude-code'
    static_configs:
      - targets: ['host.docker.internal:9464']
        labels:
          service: 'claude-code'
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
